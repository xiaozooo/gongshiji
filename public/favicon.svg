<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g1)"/>
  <!-- Clock circle -->
  <circle cx="32" cy="34" r="16" stroke="white" stroke-width="2.5" fill="none" opacity="0.9"/>
  <!-- Hour hand -->
  <line x1="32" y1="34" x2="32" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="32" y1="34" x2="40" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="34" r="2" fill="white"/>
  <!-- Crown -->
  <rect x="30" y="15" width="4" height="4" rx="1" fill="white" opacity="0.7"/>
</svg>
